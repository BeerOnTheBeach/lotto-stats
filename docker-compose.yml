version: '3.8'

services:
  lotto:
    build: .
    container_name: lotto-tipp-gemeinschaft
    ports:
      - "7861:7861"
    volumes:
      # Persist the data files so edits survive container restarts
      - ./lotto.json:/app/lotto.json
      - ./lotto.csv:/app/lotto.csv
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7861
      - GRADIO_ROOT_PATH=/
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7861"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
